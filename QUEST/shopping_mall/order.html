<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주문하기 — 하연 · 白然 — 단정</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">단정 · Danjeong</a>
      <nav class="site-nav">
        <a href="index.html#situations">선물</a>
        <a href="index.html#story">브랜드</a>
        <a href="#">문의</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <nav class="breadcrumb">
      <a href="index.html">홈</a> › <a href="situation-contract.html">계약 감사</a> › <a href="product-set-a.html">하연</a> › 주문하기
    </nav>
  </div>

  <div class="container">
    <div class="order-layout">
      <div class="order-main">

        <div class="step">
          <div class="step-num">Step 01</div>
          <h2>수신자 정보</h2>
          <p class="help">엑셀에서 <strong>이름 · 주소 · 메시지</strong> 순서로 복사한 뒤 아래에 붙여넣으세요. 하나씩 추가할 수도 있습니다.</p>
          <textarea id="paste-area" class="paste-area" placeholder="예 (탭 또는 쉼표로 구분):&#10;김한결&#9;서울시 강남구 테헤란로 152 XX빌딩 10층&#9;그동안 감사드립니다.&#10;박수영, 서울시 종로구 종로 1가 XX빌딩 5층, 다음에도 잘 부탁드립니다."></textarea>

          <div id="parser-warnings" class="warnings" hidden></div>
          <div id="recipients-list" class="recipients-list"></div>
          <button type="button" class="add-btn" onclick="addRecipient()">+ 수신자 하나 추가</button>
        </div>

        <div class="step">
          <div class="step-num">Step 02</div>
          <h2>발송인 정보</h2>
          <p class="help">수신자에게 함께 전달됩니다.</p>
          <div class="form-grid">
            <div class="form-field">
              <label>회사명</label>
              <input type="text" placeholder="OO 주식회사">
            </div>
            <div class="form-field">
              <label>담당자명</label>
              <input type="text" placeholder="홍길동">
            </div>
            <div class="form-field">
              <label>담당자 연락처</label>
              <input type="tel" placeholder="010-0000-0000">
            </div>
            <div class="form-field">
              <label>이메일</label>
              <input type="email" placeholder="name@company.com">
            </div>
          </div>
        </div>

        <div class="step">
          <div class="step-num">Step 03</div>
          <h2>세금계산서 정보</h2>
          <p class="help">결제 완료 후 자동으로 발행됩니다.</p>
          <div class="form-grid">
            <div class="form-field">
              <label>사업자등록번호</label>
              <input type="text" placeholder="000-00-00000">
            </div>
            <div class="form-field">
              <label>상호</label>
              <input type="text">
            </div>
            <div class="form-field">
              <label>대표자명</label>
              <input type="text">
            </div>
            <div class="form-field">
              <label>업태 · 종목</label>
              <input type="text">
            </div>
            <div class="form-field full">
              <label>세금계산서 수신 이메일</label>
              <input type="email">
            </div>
          </div>
        </div>

      </div>

      <aside class="summary">
        <h3>주문 요약</h3>
        <div class="row"><span>세트</span><span id="summary-set-name">하연 · 白然</span></div>
        <div class="row"><span>단가</span><span id="summary-set-price">180,000원</span></div>
        <div class="row"><span>최소 수량</span><span id="summary-moq-label">5 세트</span></div>
        <div class="row"><span>수신자</span><span><span id="count">0</span>명</span></div>
        <div class="row total"><span>합계</span><span><span id="total">0</span>원</span></div>
        <div id="moq-info" class="moq-info"></div>
        <button id="pay-btn" class="btn btn-block" style="margin-top: 32px;" onclick="alert('프로토타입: 여기서 결제로 연결됩니다.')">결제하기</button>
      </aside>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">© 2026 Danjeong. All rights reserved.</div>
  </footer>

  <script src="recipient-parser.js"></script>
</body>
</html>

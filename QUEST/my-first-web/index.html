<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Johnny web</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --accent: #38bdf8;
        --text: #e2e8f0;
        --muted: #94a3b8;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
          "Pretendard", "Noto Sans KR", sans-serif;
        background: radial-gradient(circle at top, #1e293b, var(--bg));
        color: var(--text);
        padding: 24px;
      }

      .card {
        background: var(--card);
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 20px;
        padding: 48px 40px;
        max-width: 600px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }

      h1 {
        font-size: 2.75rem;
        letter-spacing: -0.02em;
        background: linear-gradient(90deg, var(--accent), #818cf8);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 24px;
      }

      p {
        font-size: 1.15rem;
        line-height: 1.8;
        color: var(--text);
      }

      h2 {
        margin-top: 36px;
        margin-bottom: 18px;
        font-size: 1.3rem;
        color: var(--accent);
      }

      ul {
        list-style: none;
        text-align: left;
      }

      li {
        background: rgba(148, 163, 184, 0.08);
        border: 1px solid rgba(148, 163, 184, 0.12);
        border-radius: 12px;
        padding: 16px 20px;
        margin-bottom: 12px;
      }

      li strong {
        display: block;
        font-size: 1.05rem;
        margin-bottom: 6px;
        color: var(--text);
      }

      li span {
        font-size: 0.95rem;
        color: var(--muted);
        line-height: 1.6;
      }

      .roadmap-link {
        display: inline-block;
        margin-top: 32px;
        padding: 12px 24px;
        background: linear-gradient(90deg, var(--accent), #818cf8);
        color: #0f172a;
        font-weight: 700;
        text-decoration: none;
        border-radius: 999px;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      .roadmap-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 24px rgba(56, 189, 248, 0.35);
      }

      .btn-row {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 32px;
      }

      .btn-row .roadmap-link {
        margin-top: 0;
      }

      .game-link {
        display: inline-block;
        padding: 12px 24px;
        background: linear-gradient(90deg, #ff3366, #ff8844);
        color: #fff;
        font-weight: 700;
        text-decoration: none;
        border-radius: 999px;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        letter-spacing: 0.5px;
      }

      .game-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 24px rgba(255, 51, 102, 0.4);
      }

      .muted {
        margin-top: 28px;
        font-size: 0.9rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Johnny web</h1>
      <p>나는 상품이 하고싶어 하는 말을 소비자에게 디자인으로 쉽게 전달하는 사람이다.</p>

      <h2>AI로 개선하고 싶은 반복 업무 3가지</h2>
      <ul>
        <li>
          <strong>프로세스 자동화</strong>
          <span>반복되는 디자인 작업 단계를 AI로 자동화해 시간을 아낀다.</span>
        </li>
        <li>
          <strong>경쟁사 자료서치 및 분석</strong>
          <span>흩어진 경쟁사 자료를 빠르게 모으고 핵심을 자동으로 정리·분석한다.</span>
        </li>
        <li>
          <strong>다양한 케이스의 초안 작성</strong>
          <span>프로젝트 성격에 맞는 여러 버전의 초안을 AI로 빠르게 만들어낸다.</span>
        </li>
      </ul>

      <div class="btn-row">
        <a
          class="roadmap-link"
          href="https://jagged-sailor-176.notion.site/c048820152dc8385836e01a64c5a7cf7?source=copy_link"
          target="_blank"
          rel="noopener noreferrer"
          >도메인 로드맵 &rarr;</a
        >
        <a class="game-link" href="./thunderbird-shooter/">🎮 게임 플레이</a>
      </div>
      <p class="muted">— 나의 첫 번째 웹 페이지</p>
    </main>
  </body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>냥냥 카트: 츄르 대작전</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="game">
    <canvas id="view"></canvas>

    <div id="hud-top">
      <div id="status" class="status-ready">준비중…</div>
      <div id="stats">
        <div class="stat"><span class="label">랩</span><span id="lap" class="value">1 / 3</span></div>
        <div class="stat"><span class="label">속도</span><span id="speed" class="value">0</span><span class="unit">km/h</span></div>
        <div class="stat"><span class="label">시간</span><span id="time" class="value">0.0</span><span class="unit">s</span></div>
      </div>
    </div>

    <div id="minimap-wrap">
      <div class="mini-title">트랙</div>
      <canvas id="minimap"></canvas>
      <div id="mini-legend">
        <span class="dot dot-me"></span>집사
        <span class="dot dot-churu"></span>츄르
      </div>
    </div>

    <div id="countdown-wrap" class="hidden">
      <div id="countdown">5</div>
      <div id="countdown-sub">준비하세요!</div>
    </div>

    <div id="controls">
      <button id="accel" type="button">
        <span class="accel-icon">🐾</span>
        <span class="accel-label">누르는 동안 가속</span>
      </button>
    </div>

    <div id="result" class="hidden">
      <div id="result-content">
        <div id="result-emoji">🏁</div>
        <h1 id="result-title"></h1>
        <p id="result-desc"></p>
        <div id="result-scene"></div>
        <button id="restart" type="button">다시하기</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
